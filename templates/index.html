<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaloriya Tracker Pro - Gemini AI</title>
    
    <!-- Telegram Web App Script - MUHIM! -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #1a1a1a;
            padding: 20px;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding-top: 20px;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 8px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #333;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .stat-item {
            text-align: center;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            display: block;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #333;
        }
        
        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 16px;
        }
        
        .hidden {
            display: none;
        }
        
        .ai-badge {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Loading Screen -->
        <div id="loading" class="loading">
            <div>Yuklanmoqda...</div>
        </div>
        
        <!-- Welcome Screen (Ro'yxatdan o'tmagan) -->
        <div id="welcomeScreen" class="hidden">
            <div class="header">
                <h1>🔥 Kaloriya Tracker</h1>
                <span class="badge">✨ Gemini 3.5 Flash AI</span>
                <p style="margin-top: 12px;">Profilingizni yarating</p>
            </div>
            
            <div class="card">
                <h2 class="card-title">Ma'lumotlaringizni kiriting</h2>
                
                <div class="input-group">
                    <label>Ism</label>
                    <input type="text" id="name" placeholder="Ismingiz">
                </div>
                
                <div class="input-group">
                    <label>Vazn (kg)</label>
                    <input type="number" id="weight" placeholder="70" step="0.1">
                </div>
                
                <div class="input-group">
                    <label>Bo'y (cm)</label>
                    <input type="number" id="height" placeholder="175">
                </div>
                
                <div class="input-group">
                    <label>Yosh</label>
                    <input type="number" id="age" placeholder="25">
                </div>
                
                <div class="input-group">
                    <label>Jins</label>
                    <select id="gender">
                        <option value="male">Erkak</option>
                        <option value="female">Ayol</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>Maqsad</label>
                    <select id="goal">
                        <option value="lose">Vazn yo'qotish</option>
                        <option value="maintain">Saqlash</option>
                        <option value="gain">Vazn to'plash</option>
                    </select>
                </div>
                
                <button class="btn btn-primary" onclick="registerUser()">
                    Boshlash
                </button>
            </div>
        </div>
        
        <!-- Main Dashboard (Ro'yxatdan o'tgan) -->
        <div id="dashboard" class="hidden">
            <div class="header">
                <h1>🔥 Kaloriya Tracker</h1>
                <span class="badge">✨ Gemini 3.5 Flash</span>
                <p id="userName">Xush kelibsiz!</p>
            </div>
            
            <!-- Kunlik statistika -->
            <div class="card">
                <h2 class="card-title">📊 Bugungi natijalar</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-value" id="consumedCal">0</span>
                        <div class="stat-label">Yegan</div>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="remainingCal">0</span>
                        <div class="stat-label">Qolgan</div>
                    </div>
                </div>
            </div>
            
            <!-- Ovqat qo'shish -->
            <div class="card">
                <h2 class="card-title">🍔 Ovqat qo'shish <span class="ai-badge">AI</span></h2>
                <div class="input-group">
                    <input type="text" id="foodName" placeholder="Masalan: non, osh, olma...">
                </div>
                <button class="btn btn-primary" onclick="addFood()">
                    Kaloriyani hisoblash
                </button>
            </div>
            
            <!-- Vazn kuzatish -->
            <div class="card">
                <h2 class="card-title">⚖️ Vazn o'lchash</h2>
                <div class="input-group">
                    <input type="number" id="currentWeight" placeholder="Hozirgi vazningiz (kg)" step="0.1">
                </div>
                <button class="btn btn-primary" onclick="logWeight()">
                    Saqlash
                </button>
            </div>
            
            <!-- Tavsiyalar -->
            <div class="card">
                <h2 class="card-title">💡 AI Tavsiyalar <span class="ai-badge">AI</span></h2>
                <button class="btn btn-primary" onclick="getRecommendations()">
                    Tavsiya olish
                </button>
                <div id="recommendationText" style="margin-top: 12px; padding: 12px; background: #f8f9fa; border-radius: 8px; display: none;"></div>
            </div>
        </div>
    </div>
    
    <script>
        // Telegram WebApp ni ishga tushirish
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Foydalanuvchi ID
        const userId = tg.initDataUnsafe.user?.id?.toString() || 'test_user';
        
        // Sahifa yuklanganda
        window.onload = async function() {
            await checkUser();
        };
        
        // Foydalanuvchini tekshirish
        async function checkUser() {
            try {
                const response = await fetch(`/api/user/${userId}`);
                const data = await response.json();
                
                document.getElementById('loading').classList.add('hidden');
                
                if (data.exists) {
                    // Ro'yxatdan o'tgan - dashboardni ko'rsat
                    showDashboard(data.user, data.today_calories);
                } else {
                    // Ro'yxatdan o'tmagan - welcome screen
                    document.getElementById('welcomeScreen').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Xatolik:', error);
                alert('Server xatoligi. Qaytadan urinib ko\'ring.');
            }
        }
        
        // Dashboardni ko'rsatish
        function showDashboard(user, calories) {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('userName').textContent = `Xush kelibsiz, ${user.name || 'Foydalanuvchi'}!`;
            document.getElementById('consumedCal').textContent = calories;
            document.getElementById('remainingCal').textContent = user.daily_calorie_norm - calories;
        }
        
        // Ro'yxatdan o'tish
        async function registerUser() {
            const userData = {
                user_id: userId,
                name: document.getElementById('name').value,
                weight: document.getElementById('weight').value,
                height: document.getElementById('height').value,
                age: document.getElementById('age').value,
                gender: document.getElementById('gender').value,
                goal: document.getElementById('goal').value
            };
            
            try {
                const response = await fetch('/api/user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    tg.showAlert('Profilingiz yaratildi!');
                    await checkUser();
                } else {
                    tg.showAlert('Xatolik yuz berdi. Qaytadan urinib ko\'ring.');
                }
            } catch (error) {
                console.error('Xatolik:', error);
                tg.showAlert('Server xatoligi.');
            }
        }
        
        // Ovqat qo'shish (Gemini AI)
        async function addFood() {
            const foodName = document.getElementById('foodName').value;
            if (!foodName) {
                tg.showAlert('Ovqat nomini kiriting!');
                return;
            }
            
            tg.showPopup({
                title: 'Hisoblanmoqda...',
                message: 'Gemini AI kaloriyani hisoblamoqda',
                buttons: [{type: 'ok'}]
            });
            
            try {
                const response = await fetch('/api/food/log', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        food_name: foodName
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    tg.showAlert(`${foodName}: ${data.calories} kcal\n\n${data.details}`);
                    document.getElementById('foodName').value = '';
                    await checkUser();
                } else {
                    tg.showAlert('Xatolik: ' + data.error);
                }
            } catch (error) {
                console.error('Xatolik:', error);
                tg.showAlert('Server xatoligi.');
            }
        }
        
        // Vazn kuzatish
        async function logWeight() {
            const weight = document.getElementById('currentWeight').value;
            if (!weight) {
                tg.showAlert('Vaznni kiriting!');
                return;
            }
            
            try {
                const response = await fetch('/api/weight/log', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        weight: weight
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    tg.showAlert(`Vazn saqlandi: ${weight} kg`);
                    document.getElementById('currentWeight').value = '';
                } else {
                    tg.showAlert('Xatolik yuz berdi.');
                }
            } catch (error) {
                console.error('Xatolik:', error);
                tg.showAlert('Server xatoligi.');
            }
        }
        
        // AI Tavsiyalar olish
        async function getRecommendations() {
            try {
                const response = await fetch(`/api/recommendations/${userId}`);
                const data = await response.json();
                
                if (data.success) {
                    const recDiv = document.getElementById('recommendationText');
                    recDiv.textContent = data.recommendation;
                    recDiv.style.display = 'block';
                } else {
                    tg.showAlert('Tavsiya olinmadi.');
                }
            } catch (error) {
                console.error('Xatolik:', error);
                tg.showAlert('Server xatoligi.');
            }
        }
    </script>
</body>
</html>
