<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - NimaYedimBot</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            background: white;
            padding: 32px;
            border-radius: 16px;
            margin-bottom: 24px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stat-label { color: #666; margin-top: 8px; font-size: 14px; }
        
        .content-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #374151;
        }
        
        tr:hover { background: #f9fafb; }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover { background: #dc2626; }
        
        .btn-warning {
            background: #f59e0b;
            color: white;
        }
        
        .btn-warning:hover { background: #d97706; }
        
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-success { background: #10b981; color: white; }
        .badge-warning { background: #f59e0b; color: white; }
        
        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 24px;
        }
        
        .search-box {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👨‍💼 Admin Panel</h1>
            <p>NimaYedimBot - Foydalanuvchilarni boshqarish</p>
        </div>
        
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="totalUsers">0</div>
                <div class="stat-label">Jami foydalanuvchilar</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeToday">0</div>
                <div class="stat-label">Bugun faol</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalCalories">0</div>
                <div class="stat-label">Jami kaloriya</div>
            </div>
        </div>
        
        <div class="content-card">
            <h2 style="margin-bottom: 16px;">📊 Umumiy statistika</h2>
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
        
        <div class="content-card">
            <h2 style="margin-bottom: 16px;">👥 Foydalanuvchilar</h2>
            <input type="text" class="search-box" id="searchBox" placeholder="Qidirish..." onkeyup="filterUsers()">
            
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Ism</th>
                        <th>Vazn</th>
                        <th>Maqsad</th>
                        <th>Til</th>
                        <th>Kunlik norma</th>
                        <th>Ro'yxatdan o'tgan</th>
                        <th>Harakatlar</th>
                    </tr>
                </thead>
                <tbody id="usersTable"></tbody>
            </table>
        </div>
    </div>
    
    <script>
        let allUsers = [];
        
        async function loadData() {
            try {
                const statsResponse = await fetch('/api/admin/statistics');
                const stats = await statsResponse.json();
                
                document.getElementById('totalUsers').textContent = stats.total_users;
                document.getElementById('activeToday').textContent = stats.active_today;
                document.getElementById('totalCalories').textContent = stats.total_calories.toLocaleString();
                
                const usersResponse = await fetch('/api/admin/users');
                const data = await usersResponse.json();
                allUsers = data.users;
                
                renderUsers(allUsers);
                renderChart(stats);
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        function renderUsers(users) {
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.user_id}</td>
                    <td>${user.name || '-'}</td>
                    <td>${user.weight} kg</td>
                    <td><span class="badge ${getGoalBadge(user.goal)}">${translateGoal(user.goal)}</span></td>
                    <td>${user.language || 'uz'}</td>
                    <td>${user.daily_calorie_norm} kcal</td>
                    <td>${new Date(user.created_at).toLocaleDateString()}</td>
                    <td>
                        <button class="btn btn-warning" onclick="blockUser('${user.user_id}')">Blok</button>
                        <button class="btn btn-danger" onclick="deleteUser('${user.user_id}')">O'chirish</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function getGoalBadge(goal) {
            const badges = {
                'lose': 'badge-success',
                'maintain': 'badge-warning',
                'gain': 'badge-success'
            };
            return badges[goal] || 'badge-warning';
        }
        
        function translateGoal(goal) {
            const goals = {
                'lose': 'Vazn yo\'qotish',
                'maintain': 'Saqlash',
                'gain': 'Vazn to\'plash'
            };
            return goals[goal] || goal;
        }
        
        function filterUsers() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const filtered = allUsers.filter(user => 
                user.name.toLowerCase().includes(search) ||
                user.user_id.includes(search)
            );
            renderUsers(filtered);
        }
        
        async function deleteUser(userId) {
            if (confirm('Rostdan ham o\'chirmoqchimisiz?')) {
                try {
                    await fetch(`/api/admin/user/${userId}`, { method: 'DELETE' });
                    loadData();
                } catch (error) {
                    alert('Xatolik!');
                }
            }
        }
        
        async function blockUser(userId) {
            if (confirm('Bloklamoqchimisiz?')) {
                try {
                    await fetch(`/api/admin/user/${userId}/block`, { method: 'POST' });
                    loadData();
                } catch (error) {
                    alert('Xatolik!');
                }
            }
        }
        
        function renderChart(stats) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Jami foydalanuvchilar', 'Bugun faol', 'Jami ovqatlar'],
                    datasets: [{
                        label: 'Statistika',
                        data: [stats.total_users, stats.active_today, stats.total_food_logs],
                        backgroundColor: [
                            'rgba(102,126,234,0.8)',
                            'rgba(118,75,162,0.8)',
                            'rgba(16,185,129,0.8)'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }
        
        loadData();
    </script>
</body>
</html>
